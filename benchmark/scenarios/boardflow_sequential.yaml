id: boardflow_sequential
title: BoardFlow sequential handoff
description: Agents use run-local BoardFlow state inside an isolated standalone demo clone.
boardflow_files_available: true
requires_handoff_json: true
checker_mode: enabled
handoff_sequence:
  - B001
  - B002
  - B003
  - B004
notes:
  - Initialize the workspace from the fixed standalone demo seed.
  - Each task should update the injected board and create a structured handoff.
  - Activate only the assigned task details after dependencies are complete.
