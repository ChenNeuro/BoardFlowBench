task_id: B001
title: Date parser
description: Fix the Expense Lite date parser so it accepts both YYYY-MM-DD and YYYY/MM/DD while returning normalized YYYY-MM-DD strings.
dependencies: []
allowed_paths:
  - src/expense_lite/parser.py
  - tests/test_parser.py
  - .board/tasks.yaml
  - PROJECT_BOARD.md
  - .board/handoffs/
acceptance_criteria:
  - Keep public parser function names unchanged.
  - Accept YYYY-MM-DD dates.
  - Accept YYYY/MM/DD dates.
  - Normalize both accepted formats to YYYY-MM-DD strings.
  - Reject malformed dates with clear ValueError messages.
acceptance_commands:
  - PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -m unittest discover -s tests -p 'test_parser.py'
regression_commands:
  - PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -m unittest discover -s tests -p 'test_validator.py'
expected_failing_test_initial_state:
  command: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=src python3 -m unittest discover -s tests -p 'test_parser.py'
  test: test_parser.DateParserTest.test_normalize_accepts_slash_date
  reason: The seed parser only accepts YYYY-MM-DD, so YYYY/MM/DD raises ValueError.
handoff_requirement:
  required: true
  schema: .board/handoff.schema.json
  directory: .board/handoffs/
