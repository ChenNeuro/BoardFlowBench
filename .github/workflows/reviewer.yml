name: Independent Reviewer

on:
  push:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  deterministic-review:
    name: Deterministic review signals
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt
      - name: Run repository tests
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -m pytest -p no:cacheprovider
      - name: Generate Repo Manager health signals
        run: PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 skills/code-health-review/scripts/health_generate_report.py .
      - name: Export reviewdog diagnostics
        run: >-
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH=. python3 -m repo_manager_core.health.reviewdog_export
          --input repo_manager_report/smell_report.json
          --profile repo_manager_report/repo_profile.json
          --output repo_manager_report/reviewdog.rdjsonl
          --repo .
          --min-severity medium
          --max-diagnostics 8
          --deduplicate
      - name: Set up reviewdog
        uses: reviewdog/action-setup@d8a7baabd7f3e8544ee4dbde3ee41d0011c3a93f # v1
      - name: Publish deterministic findings
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEWDOG_REPORTER: ${{ github.event_name == 'pull_request' && 'github-pr-review' || 'github-check' }}
          REVIEWDOG_FILTER_MODE: ${{ github.event_name == 'pull_request' && 'diff_context' || 'nofilter' }}
        run: >-
          reviewdog
          -f=rdjsonl
          -name=repo-manager-health
          -reporter="${REVIEWDOG_REPORTER}"
          -filter-mode="${REVIEWDOG_FILTER_MODE}"
          -level=warning
          < repo_manager_report/reviewdog.rdjsonl
      - name: Explain skipped fork PR publishing
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: echo "Fork PR signals were generated but not published because pull_request tokens are read-only."

  optional-independent-ai-review:
    name: Optional independent PR-Agent review
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      ENABLE_PR_AGENT: ${{ vars.ENABLE_PR_AGENT }}
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
    steps:
      - name: Run PR-Agent
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository && env.ENABLE_PR_AGENT == 'true' && env.OPENAI_KEY != '' }}
        uses: qodo-ai/pr-agent@ffe1f89a4dafc7d8e88b9cf010a3233e30b49f43 # main on 2026-06-01
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ env.OPENAI_KEY }}
      - name: Explain skipped PR-Agent review
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository || env.ENABLE_PR_AGENT != 'true' || env.OPENAI_KEY == '' }}
        run: echo "PR-Agent is optional and runs only on same-repository PRs when ENABLE_PR_AGENT=true and OPENAI_KEY is configured."
